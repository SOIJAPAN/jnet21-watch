name: 新着支援情報の自動更新

on:
  schedule:
    # 毎日 1:00 UTC = 日本時間 午前10:00
    - cron: '0 1 * * *'
  workflow_dispatch: {}   # 手動実行も可能（Actionsタブ → Run workflow）

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 新着情報を取得してページを生成
        run: python scripts/fetch_news.py

      - name: 変更をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "update: $(TZ=Asia/Tokyo date +'%Y-%m-%d') 新着情報"
          git push
